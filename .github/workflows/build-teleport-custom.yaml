name: Build Teleport Custom Image

on:
  workflow_dispatch:
    inputs:
      teleport_version:
        description: 'Teleport version tag (e.g. v18.6.4)'
        required: true
        default: 'v18.6.4'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pghoya2956/teleport-custom

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clone Teleport source
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.teleport_version }} \
            https://github.com/gravitational/teleport.git /tmp/teleport

      - name: Apply patches — Enterprise feature unlock
        run: |
          cd /tmp/teleport

          # Patch 1: lib/services/github.go — Remove IsOSSBuild() validation block
          python3 << 'PYEOF'
          import re

          with open("lib/services/github.go", "r") as f:
              content = f.read()
              lines = content.split('\n')

          new_lines = []
          skip = False
          brace_count = 0
          for line in lines:
              if 'IsOSSBuild()' in line and 'EndpointURL' not in line:
                  skip = True
                  brace_count = line.count('{') - line.count('}')
                  continue
              if skip:
                  brace_count += line.count('{') - line.count('}')
                  if brace_count <= 0:
                      skip = False
                  continue
              new_lines.append(line)

          patched = '\n'.join(new_lines)

          if patched.count('fmt.') == 0:
              patched = re.sub(r'\n\t"fmt"\n', '\n', patched)
          if patched.count('modules.') == 0:
              patched = re.sub(r'\n\t"github\.com/gravitational/teleport/lib/modules"\n', '\n', patched)

          with open("lib/services/github.go", "w") as f:
              f.write(patched)
          print("Patch 1 applied: lib/services/github.go")
          PYEOF

          # Patch 2: api/types/github.go — Fix hardcoded GetEndpointURL/GetAPIEndpointURL
          # These getters always return github.com constants, ignoring Spec values.
          # Change them to return Spec values with fallback to defaults.
          python3 << 'PYEOF'
          with open("api/types/github.go", "r") as f:
              content = f.read()

          # Replace GetEndpointURL
          old_get_endpoint = '''func (c *GithubConnectorV3) GetEndpointURL() string {
          	return GithubURL
          }'''
          new_get_endpoint = '''func (c *GithubConnectorV3) GetEndpointURL() string {
          	if c.Spec.EndpointURL != "" {
          		return c.Spec.EndpointURL
          	}
          	return GithubURL
          }'''

          # Replace GetAPIEndpointURL
          old_get_api = '''func (c *GithubConnectorV3) GetAPIEndpointURL() string {
          	return GithubAPIURL
          }'''
          new_get_api = '''func (c *GithubConnectorV3) GetAPIEndpointURL() string {
          	if c.Spec.APIEndpointURL != "" {
          		return c.Spec.APIEndpointURL
          	}
          	return GithubAPIURL
          }'''

          content = content.replace(old_get_endpoint, new_get_endpoint)
          content = content.replace(old_get_api, new_get_api)

          with open("api/types/github.go", "w") as f:
              f.write(content)
          print("Patch 2 applied: api/types/github.go")
          PYEOF

          # Patch 3: lib/auth/github.go — Remove checkGithubOrgSSOSupport Enterprise-only bypass
          python3 << 'PYEOF'
          with open("lib/auth/github.go", "r") as f:
              content = f.read()

          # Make checkGithubOrgSSOSupport always return nil (skip org SSO check)
          old = 'version := modules.GetModules().BuildType()\n\tif version == modules.BuildEnterprise {\n\t\treturn nil\n\t}'
          new = 'return nil // patched: skip org SSO check for custom endpoint\n\tversion := modules.GetModules().BuildType()\n\tif version == modules.BuildEnterprise {\n\t\treturn nil\n\t}'

          if old in content:
              content = content.replace(old, new)
              print("Patch 3 applied: lib/auth/github.go (checkGithubOrgSSOSupport)")
          else:
              print("Patch 3 skipped: pattern not found in lib/auth/github.go")

          with open("lib/auth/github.go", "w") as f:
              f.write(content)
          PYEOF

          # Patch 4: lib/auth/github.go — Change "token" to "Bearer" in Authorization header
          # Authentik's GitHub compatibility endpoints only accept "Bearer" format.
          # Teleport sends "Authorization: token xxx" (GitHub legacy), change to "Bearer xxx".
          python3 << 'PYEOF'
          with open("lib/auth/github.go", "r") as f:
              content = f.read()

          old_auth = 'request.Header.Set("Authorization", fmt.Sprintf("token %v", c.token))'
          new_auth = 'request.Header.Set("Authorization", fmt.Sprintf("Bearer %v", c.token))'

          if old_auth in content:
              content = content.replace(old_auth, new_auth)
              print("Patch 4 applied: lib/auth/github.go (token → Bearer)")
          else:
              print("Patch 4 skipped: pattern not found")

          with open("lib/auth/github.go", "w") as f:
              f.write(content)
          PYEOF

          # Patch 5: lib/services/local/access_list.go — Remove Access List create limit
          # VerifyAccessListCreateLimit gates Access List creation to 1 in OSS.
          # Replace function body with "return nil" to remove the limit.
          python3 << 'PYEOF'
          with open("lib/services/local/access_list.go", "r") as f:
              lines = f.read().split('\n')

          new_lines = []
          skip = False
          brace_count = 0
          func_found = False
          for line in lines:
              if line.strip().startswith('func') and 'VerifyAccessListCreateLimit' in line and '{' in line:
                  new_lines.append(line)
                  new_lines.append('\treturn nil')
                  skip = True
                  brace_count = line.count('{') - line.count('}')
                  func_found = True
                  continue
              if skip:
                  brace_count += line.count('{') - line.count('}')
                  if brace_count <= 0:
                      new_lines.append('}')
                      skip = False
                  continue
              new_lines.append(line)

          with open("lib/services/local/access_list.go", "w") as f:
              f.write('\n'.join(new_lines))

          if func_found:
              print("Patch 5 applied: lib/services/local/access_list.go (VerifyAccessListCreateLimit)")
          else:
              print("WARNING: Patch 5 failed — VerifyAccessListCreateLimit not found")
          PYEOF

          echo "=== Verify patches ==="
          grep -n "IsOSSBuild" lib/services/github.go && echo "WARNING" || echo "Patch 1 OK"
          grep -n "Spec.EndpointURL" api/types/github.go && echo "Patch 2 OK" || echo "WARNING: Patch 2 failed"
          grep -n "patched: skip" lib/auth/github.go && echo "Patch 3 OK" || echo "Patch 3 skipped"
          grep -n "Bearer" lib/auth/github.go && echo "Patch 4 OK" || echo "WARNING: Patch 4 failed"
          grep -A1 "VerifyAccessListCreateLimit" lib/services/local/access_list.go | grep -q "return nil" && echo "Patch 5 OK" || echo "WARNING: Patch 5 failed"

      - name: Create Dockerfile
        run: |
          cat > /tmp/teleport/Dockerfile.custom << 'DOCKERFILE'
          FROM golang:1.24-bookworm AS builder
          WORKDIR /teleport
          COPY . .
          RUN apt-get update && apt-get install -y libpam0g-dev binaryen && \
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
              apt-get install -y nodejs && \
              corepack enable && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          ENV PATH="/root/.cargo/bin:${PATH}"
          RUN rustup target add wasm32-unknown-unknown && \
              cargo install wasm-bindgen-cli@0.2.99
          RUN make full FIDO2=no PIV=no ROLETESTER=no

          FROM public.ecr.aws/gravitational/teleport-distroless:18.6.4
          COPY --from=builder /teleport/build/teleport /usr/local/bin/teleport
          COPY --from=builder /teleport/build/tctl /usr/local/bin/tctl
          COPY --from=builder /teleport/build/tbot /usr/local/bin/tbot
          DOCKERFILE

      - name: Extract version tag
        id: version
        run: |
          RAW="${{ github.event.inputs.teleport_version }}"
          TAG="${RAW#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "vtag=${RAW}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: /tmp/teleport
          file: /tmp/teleport/Dockerfile.custom
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.vtag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
